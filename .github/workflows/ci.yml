name: Continuous Integration Gates

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ---------------------------------------------------------------------------
  # 1. Backend CI Job (Python + FastAPI + Pytest)
  # ---------------------------------------------------------------------------
  backend-ci:
    name: Backend Pytest Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Python Package Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Run Backend Integration Unit Tests
      run: |
        pytest backend/test_app.py

  # ---------------------------------------------------------------------------
  # 2. Web UI CI Job (Node + Vite Build Check)
  # ---------------------------------------------------------------------------
  web-ui-ci:
    name: Web Frontend Compile Gates
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Frontend Dependencies
      working-directory: frontend
      run: |
        npm install --no-audit --no-fund

    - name: Run Vite Production Build Compilation Check
      working-directory: frontend
      run: |
        npm run build

  # ---------------------------------------------------------------------------
  # 3. Mobile UI CI Job (Node + Expo TypeScript Compile Check)
  # ---------------------------------------------------------------------------
  mobile-ui-ci:
    name: Mobile Expo Type Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: mobile/package-lock.json

    - name: Install Mobile App Dependencies
      working-directory: mobile
      run: |
        npm install --no-audit --no-fund

    - name: Run TypeScript Compile Check
      working-directory: mobile
      run: |
        npx tsc --noEmit
