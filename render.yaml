# Render Blueprint Spec: Socratic Tutor Backend Only
# Import this file in the Render Dashboard (Blueprints section) to deploy the FastAPI container.

services:
  # ---------------------------------------------------------------------------
  # Python FastAPI Backend (WebSocket Container)
  # ---------------------------------------------------------------------------
  - type: web
    name: sdlc-learning-app-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: GEMINI_API_KEY
        sync: true # Prompts you to enter your Gemini API Key in the UI
